<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      white-space: nowrap;
    }

    #search {
      flex: 1;
      max-width: 300px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 5px 11px;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: #58a6ff; }
    #search::placeholder { color: #484f58; }

    #request-btn {
      margin-left: auto;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 5px 12px;
      font-size: 0.8rem;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }
    #request-btn:hover { background: #30363d; border-color: #58a6ff; color: #58a6ff; }

    /* ── Mode toggle ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      color: #8b949e;
      white-space: nowrap;
    }

    .toggle-wrap input[type="checkbox"] { display: none; }

    .toggle-track {
      width: 40px;
      height: 22px;
      background: #30363d;
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: #e6edf3;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: left 0.2s;
    }
    input[type="checkbox"]:checked + .toggle-track { background: #58a6ff; }
    input[type="checkbox"]:checked + .toggle-track::after { left: 21px; }

    /* ── Embed overlay ── */
    #embed-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 100;
      flex-direction: column;
    }

    #embed-bar {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #embed-back {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 4px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #embed-back:hover { background: #30363d; }

    #embed-title {
      font-size: 0.9rem;
      color: #8b949e;
      flex: 1;
    }

    #embed-fullscreen {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      padding: 4px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    #embed-fullscreen:hover { background: #30363d; border-color: #58a6ff; color: #58a6ff; }
    #embed-fullscreen .icon-enter { display: inline; }
    #embed-fullscreen .icon-exit  { display: none; }
    #embed-fullscreen.is-fullscreen .icon-enter { display: none; }
    #embed-fullscreen.is-fullscreen .icon-exit  { display: inline; }

    #embed-frame {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
    }

    /* ── Game grid ── */
    #game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 14px;
      padding: 20px;
    }

    #no-results {
      display: none;
      padding: 40px 20px;
      color: #484f58;
      font-size: 0.9rem;
      text-align: center;
    }

    #loading-msg {
      padding: 40px 20px;
      color: #484f58;
      font-size: 0.9rem;
      text-align: center;
    }

    #error-msg {
      display: none;
      padding: 40px 20px;
      color: #f85149;
      font-size: 0.9rem;
      text-align: center;
    }

    .game-btn {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #e6edf3;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 22px 14px;
      font-size: 0.875rem;
      font-weight: 500;
      text-align: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
      min-height: 115px;
    }
    .game-btn:hover {
      background: #21262d;
      border-color: #58a6ff;
      transform: translateY(-2px);
    }
    .game-btn:active { transform: translateY(0); }
    .game-btn .icon { font-size: 2rem; line-height: 1; }
    .game-btn .label { line-height: 1.3; word-break: break-word; }
  </style>
</head>

  <iframe id="embed-frame" title="Game" allowfullscreen

  // Convert filenames like "bloonsTD5", "superMario64", "fnaf_world" → readable names
  function prettify(filename) {
    let name = filename.replace(/\.html?$/i, '');

    // Check override map first (handles all-lowercase compound names)
    const key = name.toLowerCase().replace(/[_\-\s\.]+/g, '');
    if (NAME_OVERRIDES[key]) return NAME_OVERRIDES[key];
    if (NAME_OVERRIDES[name.toLowerCase()]) return NAME_OVERRIDES[name.toLowerCase()];

    // No override found — log so missing names are easy to spot
    console.warn(`[Games] No override for: "${filename}" (key: "${key}")`);
    // Replace underscores/hyphens with spaces
    name = name.replace(/[_\-]+/g, ' ');

    // Split on camelCase and PascalCase boundaries:
    // "bloonsTD5"   → "bloons TD 5"
    // "superMario"  → "super Mario"
    // "HTMLGame"    → "HTML Game"
    name = name
      // lowercase followed by uppercase: "nsTD" → "ns TD"
      .replace(/([a-z])([A-Z])/g, '$1 $2')
      // sequence of uppercase followed by uppercase+lowercase: "TDGame" → "TD Game"
      .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
      // letter followed by digit: "Mario64" → "Mario 64"
      .replace(/([A-Za-z])(\d)/g, '$1 $2')
      // digit followed by letter: "64Super" → "64 Super"
      .replace(/(\d)([A-Za-z])/g, '$1 $2')
      // collapse multiple spaces
      .replace(/\s+/g, ' ')
      .trim();

    // Title-case each word
    return name.replace(/\b\w/g, c => c.toUpperCase());
  }

  const REPOS = [
    {
      api:    'https://api.github.com/repos/Subthemenis/Games/contents/Games',
      raw:    'https://raw.githubusercontent.com/Subthemenis/Games/main/Games/',
    },
  ];

  const grid       = document.getElementById('game-grid');
  const loadingMsg = document.getElementById('loading-msg');
  const errorMsg   = document.getElementById('error-msg');
  const noResults  = document.getElementById('no-results');
  const searchBox  = document.getElementById('search');
  const modeToggle = document.getElementById('mode-toggle');
  const modeLabel  = document.getElementById('mode-label');
  const embedOverlay = document.getElementById('embed-overlay');
  const embedFrame   = document.getElementById('embed-frame');
  const embedTitle   = document.getElementById('embed-title');
  const fsBtn        = document.getElementById('embed-fullscreen');

  // ── Load game list from both repos ──
  async function loadGames() {
    try {
      // Fetch both repos in parallel
      const results = await Promise.allSettled(
        REPOS.map(repo =>
          fetch(repo.api, { headers: { 'Accept': 'application/vnd.github+json' } })
            .then(r => r.ok ? r.json() : Promise.reject(`API ${r.status}`))
            .then(data => data
              .filter(f => f.type === 'file' && /\.html?$/i.test(f.name))
              .map(f => ({ file: f.name, raw: repo.raw + encodeURIComponent(f.name) }))
            )
        )
      );

      // Merge, deduplicate by filename (case-insensitive), sort alphabetically
      const seen = new Set();
      const allFiles = [];
      for (const result of results) {
        if (result.status === 'fulfilled') {
          for (const entry of result.value) {
            const key = entry.file.toLowerCase();
            if (!seen.has(key)) {
              seen.add(key);
              allFiles.push(entry);
            }
          }
        }
      }

      // Blacklist
      const BLACKLIST = new Set(['sandgame.html', '1.12.html', '1.5.html', '1.8.html', 'alpha 1.2.6.html', 'alpha1.2.6.html', 'beta 1.3.html', 'beta1.3.html', 'indev.html']);
      const files = allFiles
        .filter(e => !BLACKLIST.has(e.file.toLowerCase()))
        .sort((a, b) => a.file.localeCompare(b.file, undefined, { sensitivity: 'base' }));

      if (!files.length) throw new Error('No HTML files found in either repo');

      loadingMsg.style.display = 'none';

      for (const { file, raw } of files) {
        const name = prettify(file);
        const btn  = document.createElement('button');
        btn.className = 'game-btn';
        btn.dataset.url  = raw;
        btn.dataset.name = name;
        btn.innerHTML = `<span class="icon">${iconFor(name)}</span><span class="label">${name}</span>`;
        grid.appendChild(btn);
      }
    } catch (err) {
      loadingMsg.style.display = 'none';
      errorMsg.style.display   = 'block';
      errorMsg.textContent     = `Failed to load games list: ${err.message}. Make sure you have internet access.`;
    }
  }

  loadGames();

  // ── Mode toggle ──
  modeToggle.addEventListener('change', () => {
    modeLabel.textContent = modeToggle.checked ? 'Embed' : 'Popout';
  });

  // ── Back button ──
  document.getElementById('embed-back').addEventListener('click', () => {
    exitFullscreen();
    embedOverlay.style.display = 'none';
    embedFrame.src = 'about:blank';
  });

  // ── Fullscreen ──
  function enterFullscreen() {
    const el = embedOverlay;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) req.call(el);
  }
  function exitFullscreen() {
    const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
    if (exit && document.fullscreenElement) exit.call(document);
  }

  fsBtn.addEventListener('click', () => {
    document.fullscreenElement ? exitFullscreen() : enterFullscreen();
  });

  document.addEventListener('fullscreenchange', () => {
    if (document.fullscreenElement) {
      fsBtn.classList.add('is-fullscreen');
      fsBtn.title = 'Exit Fullscreen';
      fsBtn.lastChild.textContent = ' Exit';
    } else {
      fsBtn.classList.remove('is-fullscreen');
      fsBtn.title = 'Fullscreen';
      fsBtn.lastChild.textContent = ' Fullscreen';
    }
  });

  // ── Game click handler ──
  // Strategy: fetch raw HTML text, then document.write() into a fresh blank
  // tab or iframe. This gives Ruffle/Unity/WebGL a completely clean JS context
  // with zero scripts from our launcher page — fixing the "conflicts with Ruffle"
  // error. raw.githubusercontent.com serves text/plain so we can't navigate
  // there directly; document.write() bypasses the MIME issue entirely.
  async function openGame(rawUrl, name) {
    const embedMode = modeToggle.checked;

    // Show loading state
    let loadingTarget = null;
    if (embedMode) {
      embedTitle.textContent = name + ' — loading…';
      embedOverlay.style.display = 'flex';
      embedFrame.srcdoc = '<body style="background:#0d1117;color:#8b949e;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-size:1rem">Loading…</body>';
    } else {
      loadingTarget = window.open('about:blank', '_blank');
      if (loadingTarget) {
        loadingTarget.document.write('<html><body style="background:#0d1117;color:#8b949e;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-size:1rem">Loading…</body></html>');
        loadingTarget.document.close();
      }
    }

    try {
      const res = await fetch(rawUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const html = await res.text();

      if (embedMode) {
        // srcdoc gives a clean origin — Ruffle's workers resolve correctly
        embedTitle.textContent = name;
        embedFrame.srcdoc = html;
      } else {
        if (!loadingTarget || loadingTarget.closed) throw new Error('Popup was blocked');
        // document.write into the already-open blank tab — clean JS context
        loadingTarget.document.open();
        loadingTarget.document.write(html);
        loadingTarget.document.close();
      }
    } catch (err) {
      const errHtml = `<body style="background:#0d1117;color:#f85149;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:12px">
        <div style="font-size:1.2rem">Failed to load "${name}"</div>
        <div style="font-size:0.85rem;color:#8b949e">${err.message}</div>
      </body>`;
      if (embedMode) {
        embedFrame.srcdoc = errHtml;
      } else if (loadingTarget && !loadingTarget.closed) {
        loadingTarget.document.open();
        loadingTarget.document.write(errHtml);
        loadingTarget.document.close();
      }
    }
  }

  grid.addEventListener('click', e => {
    const btn = e.target.closest('.game-btn');
    if (!btn) return;
    openGame(btn.dataset.url, btn.dataset.name);
  });

  // ── Search ──
  searchBox.addEventListener('input', function () {
    const query = this.value.trim().toLowerCase();
    const buttons = grid.querySelectorAll('.game-btn');
    let visible = 0;
    buttons.forEach(btn => {
      const match = btn.dataset.name.toLowerCase().includes(query);
      btn.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    noResults.style.display = (visible === 0 && buttons.length > 0) ? 'block' : 'none';
  });
</script>
